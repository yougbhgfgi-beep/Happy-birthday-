  <body>
    <div id="root"></div>

    <script>
      (function() {
        // ---- Before Install Prompt ----
        var installPrompt = null;
        var installButton = null;

        window.addEventListener('beforeinstallprompt', function(e) {
          e.preventDefault();
          installPrompt = e;
          
          // Create install button
          installButton = document.createElement('button');
          installButton.id = 'pwa-install-btn';
          installButton.innerHTML = '⬇️ تثبيت التطبيق';
          installButton.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:linear-gradient(135deg,#f43f5e,#be123c);color:#fff;border:none;padding:12px 28px;border-radius:50px;font-size:14px;font-family:inherit;cursor:pointer;box-shadow:0 8px 32px rgba(244,63,94,0.4);transition:all .3s;opacity:0;animation:fadeInUp 0.5s forwards;display:none';
          
          installButton.onmouseenter = function() { this.style.transform = 'translateX(-50%) scale(1.05)'; };
          installButton.onmouseleave = function() { this.style.transform = 'translateX(-50%) scale(1)'; };
          
          installButton.onclick = function() {
            if (!installPrompt) return;
            installPrompt.prompt();
            installPrompt.userChoice.then(function(choice) {
              if (choice.outcome === 'accepted') {
                installButton.style.display = 'none';
              }
              installPrompt = null;
            });
          };

          document.body.appendChild(installButton);
          installButton.style.display = 'block';
        });

        window.addEventListener('appinstalled', function() {
          if (installButton) {
            installButton.style.display = 'none';
          }
          installPrompt = null;
        });

        // ---- Service Worker ----
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js').catch(function() {});
          });
        }
      })();
    </script>

    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateX(-50%) translateY(20px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
    </style>
